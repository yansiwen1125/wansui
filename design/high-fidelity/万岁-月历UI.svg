      <rect y="10" width="7" height="7" rx="2" fill="#D8D6D0"/><rect x="10" y="10" width="7" height="7" rx="2" fill="#D8D6D0"/><rect x="20" y="10" width="7" height="7" rx="2" fill="#D8D6D0"/>
      <rect y="20" width="7" height="7" rx="2" fill="#D8D6D0"/><rect x="10" y="20" width="7" height="7" rx="2" fill="#D8D6D0"/><rect x="20" y="20" width="7" height="7" rx="2" fill="#D8D6D0"/>
    </g>
    <g id="nine-a">
