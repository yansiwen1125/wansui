      <text x="155" y="501">15</text><use href="#nine" x="141.5" y="511"/>
      <text x="205" y="501">16</text><use href="#nine" x="191.5" y="511"/>
      <text x="255" y="501">17</text><use href="#nine" x="241.5" y="511"/>
