<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100">
  <rect width="900" height="1100" fill="#f2f2f2"/>

  <text x="80" y="88" font-family="Arial, PingFang SC, sans-serif" font-size="28" font-weight="700" fill="#222">万岁 App · 记录页低保真</text>
  <text x="80" y="126" font-family="Arial, PingFang SC, sans-serif" font-size="18" fill="#777">按月份｜九宫格展示系统预制任务</text>

  <!-- Phone frame -->
  <rect x="245" y="168" width="410" height="820" rx="58" fill="#fff" stroke="#222" stroke-width="5"/>
  <rect x="375" y="187" width="150" height="26" rx="13" fill="#222"/>

  <!-- Text tabs: selected tab acts as the large title -->
  <text x="285" y="280" font-family="Arial, PingFang SC, sans-serif" font-size="32" font-weight="700" fill="#222">月历</text>
  <text x="372" y="278" font-family="Arial, PingFang SC, sans-serif" font-size="21" font-weight="400" fill="#aaa">任务</text>

  <!-- Month navigation -->
  <path d="M367 327 L356 335 L367 343" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="450" y="343" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-size="23" font-weight="600" fill="#333">2026年6月</text>
  <path d="M533 327 L544 335 L533 343" fill="none" stroke="#c8c8c8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Enlarged calendar region -->
  <g transform="translate(-54 -42) scale(1.12)">
  <!-- Weekday labels -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="14" fill="#777" text-anchor="middle">
    <text x="302" y="394">日</text>
    <text x="351" y="394">一</text>
    <text x="400" y="394">二</text>
    <text x="449" y="394">三</text>
    <text x="498" y="394">四</text>
    <text x="547" y="394">五</text>
    <text x="596" y="394">六</text>
  </g>
  <line x1="278" y1="410" x2="622" y2="410" stroke="#e7e7e7" stroke-width="2"/>

  <!-- Calendar cells. Each cell: date plus 3x3 task grid -->
  <defs>
    <g id="grid-gray">
      <rect x="0" y="0" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="10" y="0" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="0" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="0" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="10" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="0" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="10" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
    </g>
    <g id="grid-light">
      <rect x="0" y="0" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="10" y="0" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="20" y="0" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="0" y="10" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="10" y="10" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="20" y="10" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="0" y="20" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="10" y="20" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
      <rect x="20" y="20" width="8" height="8" rx="1.5" fill="#f0f0f0"/>
    </g>
    <g id="grid-color-a">
      <rect x="0" y="0" width="8" height="8" rx="1.5" fill="#a9795b"/>
      <rect x="10" y="0" width="8" height="8" rx="1.5" fill="#315f8a"/>
      <rect x="20" y="0" width="8" height="8" rx="1.5" fill="#82bde3"/>
      <rect x="0" y="10" width="8" height="8" rx="1.5" fill="#7fb77e"/>
      <rect x="10" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="0" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="10" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
    </g>
    <g id="grid-color-b">
      <rect x="0" y="0" width="8" height="8" rx="1.5" fill="#a9795b"/>
      <rect x="10" y="0" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="0" width="8" height="8" rx="1.5" fill="#82bde3"/>
      <rect x="0" y="10" width="8" height="8" rx="1.5" fill="#7fb77e"/>
      <rect x="10" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="10" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="0" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="10" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
      <rect x="20" y="20" width="8" height="8" rx="1.5" fill="#dedede"/>
    </g>
  </defs>

  <!-- May 31 placeholder and June 1-6 -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="11" fill="#777" text-anchor="middle">
    <text x="302" y="442" fill="#ccc">31</text><use href="#grid-light" x="288" y="451"/>
    <rect x="330" y="423" width="42" height="66" rx="7" fill="#f3f9f2"/>
    <text x="351" y="442">1</text><use href="#grid-color-a" x="337" y="451"/>
    <text x="400" y="442">2</text><use href="#grid-color-b" x="386" y="451"/>
    <rect x="428" y="423" width="42" height="66" rx="7" fill="#f3f9f2"/>
    <text x="449" y="442">3</text><use href="#grid-color-a" x="435" y="451"/>
    <text x="498" y="442">4</text><use href="#grid-color-b" x="484" y="451"/>
    <rect x="526" y="423" width="42" height="66" rx="7" fill="#f3f9f2"/>
    <text x="547" y="442">5</text><use href="#grid-color-a" x="533" y="451"/>
    <text x="596" y="442">6</text><use href="#grid-gray" x="582" y="451"/>
  </g>

  <!-- Dates 7-13; 11 is today -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="11" fill="#777" text-anchor="middle">
    <text x="302" y="520">7</text><use href="#grid-color-b" x="288" y="529"/>
    <text x="351" y="520">8</text><use href="#grid-color-b" x="337" y="529"/>
    <rect x="379" y="501" width="42" height="66" rx="7" fill="#f3f9f2"/>
    <text x="400" y="520">9</text><use href="#grid-color-a" x="386" y="529"/>
    <text x="449" y="520">10</text><use href="#grid-color-b" x="435" y="529"/>
    <rect x="477" y="501" width="42" height="66" rx="7" fill="#f3f9f2"/>
    <rect x="477" y="501" width="42" height="66" rx="7" fill="none" stroke="#222" stroke-width="2"/>
    <text x="498" y="520">11</text><use href="#grid-color-a" x="484" y="529"/>
    <text x="547" y="520">12</text><use href="#grid-gray" x="533" y="529"/>
    <text x="596" y="520">13</text><use href="#grid-gray" x="582" y="529"/>
  </g>

  <!-- Dates 14-20 -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="11" fill="#777" text-anchor="middle">
    <text x="302" y="598">14</text><use href="#grid-gray" x="288" y="607"/>
    <text x="351" y="598">15</text><use href="#grid-gray" x="337" y="607"/>
    <text x="400" y="598">16</text><use href="#grid-gray" x="386" y="607"/>
    <text x="449" y="598">17</text><use href="#grid-gray" x="435" y="607"/>
    <text x="498" y="598">18</text><use href="#grid-gray" x="484" y="607"/>
    <text x="547" y="598">19</text><use href="#grid-gray" x="533" y="607"/>
    <text x="596" y="598">20</text><use href="#grid-gray" x="582" y="607"/>
  </g>

  <!-- Dates 21-27 -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="11" fill="#777" text-anchor="middle">
    <text x="302" y="676">21</text><use href="#grid-gray" x="288" y="685"/>
    <text x="351" y="676">22</text><use href="#grid-gray" x="337" y="685"/>
    <text x="400" y="676">23</text><use href="#grid-gray" x="386" y="685"/>
    <text x="449" y="676">24</text><use href="#grid-gray" x="435" y="685"/>
    <text x="498" y="676">25</text><use href="#grid-gray" x="484" y="685"/>
    <text x="547" y="676">26</text><use href="#grid-gray" x="533" y="685"/>
    <text x="596" y="676">27</text><use href="#grid-gray" x="582" y="685"/>
  </g>

  <!-- Dates 28-30 and July placeholders -->
  <g font-family="Arial, PingFang SC, sans-serif" font-size="11" text-anchor="middle">
    <text x="302" y="754" fill="#777">28</text><use href="#grid-gray" x="288" y="763"/>
    <text x="351" y="754" fill="#777">29</text><use href="#grid-gray" x="337" y="763"/>
    <text x="400" y="754" fill="#777">30</text><use href="#grid-gray" x="386" y="763"/>
    <text x="449" y="754" fill="#ccc">1</text><use href="#grid-light" x="435" y="763"/>
    <text x="498" y="754" fill="#ccc">2</text><use href="#grid-light" x="484" y="763"/>
    <text x="547" y="754" fill="#ccc">3</text><use href="#grid-light" x="533" y="763"/>
    <text x="596" y="754" fill="#ccc">4</text><use href="#grid-light" x="582" y="763"/>
  </g>
  </g>

  <!-- Bottom navigation -->
  <line x1="247" y1="879" x2="653" y2="879" stroke="#ccc" stroke-width="2"/>
  <circle cx="355" cy="922" r="13" fill="none" stroke="#999" stroke-width="2"/>
  <text x="355" y="958" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-size="16" fill="#777">首页</text>
  <rect x="532" y="909" width="27" height="27" fill="#333" rx="5"/>
  <text x="545" y="958" text-anchor="middle" font-family="Arial, PingFang SC, sans-serif" font-size="16" font-weight="700" fill="#222">记录</text>
</svg>
